<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Nguyễn Đỗ Phương Trang</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased flex flex-col min-h-screen">

    <header class="fixed top-0 left-0 right-0 bg-white shadow-sm z-50 border-b border-slate-100">
        <div class="max-w-5xl mx-auto px-4 h-16 flex flex-col justify-center sm:flex-row sm:items-center sm:justify-between py-2 sm:py-0">
            <a href="index.html" class="font-bold text-slate-900 tracking-wider text-sm sm:text-base uppercase text-center sm:text-left">PT.Portfolio</a>
            <nav class="flex justify-center space-x-4 sm:space-x-8 text-[10px] sm:text-xs font-semibold uppercase tracking-wider text-slate-600 mt-1 sm:mt-0">
                <a href="index.html" class="hover:text-indigo-600 transition-colors">About Us</a>
                <a href="cv.html" class="hover:text-indigo-600 transition-colors">CV</a>
                <a href="product.html" class="hover:text-indigo-600 transition-colors">My Product</a>
                <a href="contact.html" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Contact</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow pt-28 max-w-5xl w-full mx-auto px-4 md:px-6 mb-16">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-1 space-y-6">
                <div>
                    <h3 class="text-sm font-bold text-slate-900 tracking-wider uppercase mb-3">Liên Hệ Với Mình</h3>
                    <p class="text-slate-500 text-xs leading-relaxed">Bạn có thể gửi lời nhắn trực tiếp qua form bên cạnh hoặc kết nối với mình qua các kênh thông tin dưới đây nhé!</p>
                </div>
                <div class="space-y-3 text-xs">
                    <div class="flex items-center space-x-3 text-slate-600">
                        <i class="fas fa-envelope text-indigo-600 w-4"></i>
                        <span class="break-all">trang52410060@caodangvietmy.edu.vn</span>
                    </div>
                    <div class="flex items-center space-x-3 text-slate-600">
                        <i class="fas fa-phone text-indigo-600 w-4"></i>
                        <span>0796990203</span>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 bg-white rounded-xl border border-slate-100 shadow-xs p-6 md:p-8">
                <form onsubmit="event.preventDefault(); alert('Cảm ơn bạn đã gửi lời nhắn!');" class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold tracking-wider text-slate-700 uppercase">Họ và tên</label>
                            <input type="text" required placeholder="Nguyễn Văn A" class="w-full px-3 py-2 border border-slate-200 rounded text-xs focus:outline-none focus:border-indigo-600">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[11px] font-bold tracking-wider text-slate-700 uppercase">Địa chỉ Email</label>
                            <input type="email" required placeholder="example@gmail.com" class="w-full px-3 py-2 border border-slate-200 rounded text-xs focus:outline-none focus:border-indigo-600">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[11px] font-bold tracking-wider text-slate-700 uppercase">Lời nhắn</label>
                        <textarea required rows="4" placeholder="Nhập nội dung tin nhắn của bạn tại đây..." class="w-full px-3 py-2 border border-slate-200 rounded text-xs focus:outline-none focus:border-indigo-600"></textarea>
                    </div>
                    <button type="submit" class="px-5 py-2 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded text-xs uppercase tracking-wider cursor-pointer transition-colors">
                        Gửi lời nhắn
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-500 py-6 text-center text-xs space-y-3 mt-auto">
        <div class="flex justify-center space-x-6 text-lg">
            <a href="https://github.com/trang52410060-svg" target="_blank" class="hover:text-white transition-colors"><i class="fab fa-github"></i></a>
            <a href="#" target="_blank" class="hover:text-white transition-colors"><i class="fab fa-facebook"></i></a>
        </div>
        <p class="text-[11px] tracking-wide">&copy; 2026 Nguyễn Đỗ Phương Trang. All rights reserved.</p>
    </footer>

</body>
</html>
